<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MAXONIK admin login" />
  <title>MAXONIK | Вхід в адмін-панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-login-shell {
      width: min(1120px, 94vw);
      margin-inline: auto;
      padding-bottom: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .admin-guard {
      margin-top: calc(var(--topbar-h) + 14px);
      max-width: 520px;
      width: 100%;
      border: 1px solid var(--line-soft);
      background: linear-gradient(120deg, rgba(0, 241, 255, 0.06), rgba(0, 0, 0, 0));
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .admin-guard-form {
      display: grid;
      gap: 8px;
    }

    .admin-guard-form input {
      border: 1px solid var(--line-soft);
      background: rgba(8, 14, 22, 0.86);
      color: var(--text);
      padding: 10px 11px;
      font: inherit;
    }

    .admin-guard-form button,
    .admin-guard-google {
      width: fit-content;
      border: 1px solid var(--line-soft);
      background: rgba(0, 241, 255, 0.08);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      font-family: "Rajdhani", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.84rem;
    }

    .admin-guard-note {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.55;
      font-size: 0.9rem;
    }

    .admin-guard-status {
      margin: 0;
      min-height: 18px;
      color: #ffc2c2;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="admin-login-shell" data-admin-login-page>
    <header class="topbar">
      <a href="index.html#home" class="brand" aria-label="На головну">
        <span class="brand-glyph" aria-hidden="true">
          <img src="assets/LOgo.png?v=20260511-2" alt="" class="brand-mark-icon" />
        </span>
        <span class="brand-name" aria-hidden="true">MAXONIK</span>
      </a>

      <nav class="topnav" aria-label="Адмін навігація">
        <a href="index.html#projects">Проекти</a>
        <a href="privacy/index.html">Політики</a>
      </nav>
    </header>

    <section class="admin-guard">
      <p class="section-kicker">Admin Access</p>
      <h2>Вхід в адмін-панель</h2>
      <p class="admin-guard-note">
        Спочатку увійди через Email/Password або Google. Після авторизації автоматично відкриється конструктор.
      </p>
      <form class="admin-guard-form" data-admin-login-form>
        <input name="email" placeholder="Email" type="email" autocomplete="username" required />
        <input name="password" placeholder="Пароль" type="password" autocomplete="current-password" required />
        <button type="submit">Увійти</button>
      </form>
      <button type="button" class="admin-guard-google" data-admin-google-login>Увійти через Google</button>
      <p class="admin-guard-status" data-admin-guard-status></p>
    </section>
  </div>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="admin-auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
