<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MAXONIK зворотний зв'язок" />
  <title>MAXONIK | Зворотний зв'язок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .feedback-shell {
      width: min(900px, 94vw);
      margin-inline: auto;
      padding-bottom: 80px;
    }

    .feedback-main {
      margin-top: calc(var(--topbar-h) + 16px);
      border: 1px solid var(--line-soft);
      background: linear-gradient(120deg, rgba(0, 241, 255, 0.06), rgba(0, 0, 0, 0));
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .feedback-main h1 {
      margin: 0;
    }

    .feedback-note {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .feedback-form {
      display: grid;
      gap: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 12px;
    }

    .feedback-form label {
      display: grid;
      gap: 5px;
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .feedback-form input,
    .feedback-form textarea {
      border: 1px solid var(--line-soft);
      background: rgba(8, 14, 22, 0.86);
      color: var(--text);
      padding: 10px 11px;
      font: inherit;
    }

    .feedback-form textarea {
      min-height: 170px;
      resize: vertical;
    }

    .feedback-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .feedback-actions button,
    .feedback-actions a {
      border: 1px solid var(--line-soft);
      background: rgba(0, 241, 255, 0.08);
      color: var(--text);
      text-decoration: none;
      padding: 9px 14px;
      cursor: pointer;
      font-family: "Rajdhani", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.84rem;
    }

    .feedback-status {
      min-height: 18px;
      color: #ffc2c2;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="feedback-shell" data-feedback-page>
    <header class="topbar">
      <a href="index.html#home" class="brand" aria-label="На головну">
        <span class="brand-glyph" aria-hidden="true">
          <img src="assets/LOgo.png?v=20260511-2" alt="" class="brand-mark-icon" />
        </span>
        <span class="brand-name" aria-hidden="true">MAXONIK</span>
      </a>

      <nav class="topnav" aria-label="Навігація зворотного зв'язку">
        <a href="index.html#home">Головна</a>
        <a href="index.html#projects">Проекти</a>
        <a href="privacy/index.html">Політики</a>
      </nav>
    </header>

    <main class="feedback-main">
      <p class="section-kicker">Зворотний зв'язок</p>
      <h1>Форма зв'язку</h1>
      <p class="feedback-note">Заповніть поля нижче та натисніть Відправити. Відкриється Gmail з уже підготовленим листом.</p>

      <form class="feedback-form" data-feedback-form>
        <label>
            <span class="feedback-label-text">Ваше ім'я</span>
          <input type="text" name="name" required />
        </label>

        <label>
            <span class="feedback-label-text">Ваш E-mail</span>
          <input type="email" name="email" required />
        </label>

        <label>
            <span class="feedback-label-text">Тема</span>
          <input type="text" name="subject" required />
        </label>

        <label>
            <span class="feedback-label-text">Повідомлення</span>
          <textarea name="message" required></textarea>
        </label>

        <div class="feedback-actions">
          <button type="submit">Відправити</button>
          <a href="index.html#contact">Назад до контактів</a>
        </div>
      </form>

      <p class="feedback-status" data-feedback-status></p>
    </main>
  </div>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="admin-auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
